<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ملتقى رؤى تُبنى - تدشين حي | خلفية نجوم متحركة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- إضافة مكتبة particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            cursor: none;
        }

        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: manipulation;
            position: relative;
            background-color: #061423; /* لون احتياطي */
        }

        /* --- خلفية الجسيمات الحية (النجوم المتحركة) --- */
        #particles-js {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }

        /* الحاوية الرئيسية - تظهر فوق الخلفية */
        .screen-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10; /* أعلى من الخلفية */
            pointer-events: auto;
        }

        /* الشعارات العلوية */
        .top-logos {
            position: absolute;
            top: 30px;
            left: 40px;
            right: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .top-logo {
            height: 95px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.3));
            background: rgba(10, 25, 45, 0.5);
            border-radius: 16px;
            padding: 4px 8px;
            backdrop-filter: blur(4px);
        }

        .smart-logo {
            height: 110px;
        }

        /* فيديو العرض */
        .video-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 20;
            display: none;
        }

        /* المنصة الرئيسية - تحسين الشفافية لتظهر الخلفية الحية من خلالها */
        .scan-platform {
            position: relative;
            z-index: 15;
            text-align: center;
            background: rgba(6, 20, 35, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 70px;
            padding: 2rem 3rem;
            border: 2px solid rgba(0, 195, 255, 0.6);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 8px rgba(0, 195, 255, 0.1);
            min-width: 500px;
            transition: 0.3s;
        }

        .event-title {
            color: white;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            margin-top: 0.5rem;
            line-height: 1.4;
            text-shadow: 0 2px 15px rgba(0,0,0,0.5);
        }

        .event-sub {
            color: #ffd166;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 15px;
            border-bottom: 1px dashed #ffd166;
            display: inline-block;
            padding-bottom: 5px;
        }

        .director-name {
            color: #d9e6f2;
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 20px;
        }

        /* منطقة وضع اليد */
        .hand-placement-area {
            position: relative;
            width: 360px;
            height: 380px;
            margin: 15px auto;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50px;
            border: 2px solid rgba(0, 195, 255, 0.8);
            box-shadow: inset 0 0 40px rgba(0, 195, 255, 0.15), 0 0 30px rgba(0, 195, 255, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }

        /* أيقونة يد */
        .hand-icon {
            width: 130px;
            height: auto;
            opacity: 0.45;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        .hand-icon svg {
            width: 100%;
            fill: none;
            stroke: #7ee7ff;
            stroke-width: 1.8;
        }

        /* شريط المسح الأزرق */
        .scan-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, transparent, #00c3ff, #7ee7ff, #00c3ff, transparent);
            box-shadow: 0 0 10px #00c3ff, 0 0 25px #00c3ff;
            z-index: 25;
            display: none;
            pointer-events: none;
        }

        /* تأثير النجاح */
        .success-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 30, 60, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            z-index: 30;
        }

        .success-overlay span:first-child {
            font-size: 1.8rem;
            font-weight: 900;
            color: #00c3ff;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 60px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .success-overlay span:last-child {
            margin-top: 15px;
            color: #ffd166;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 25px;
            border-radius: 40px;
        }

        /* النصوص السفلية */
        .status {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 20px 0 10px;
            color: #7ee7ff;
            background: rgba(0, 195, 255, 0.2);
            display: inline-block;
            padding: 8px 25px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
        }

        .instruction {
            font-size: 0.95rem;
            color: #b8d8fc;
            font-weight: 500;
        }

        /* حركة نبض خفيفة فقط عند المسح */
        @keyframes gentlePulse {
            0% { border-color: rgba(0, 195, 255, 0.6); box-shadow: 0 0 0 0 rgba(0, 195, 255, 0.3); }
            100% { border-color: #00c3ff; box-shadow: 0 0 0 15px rgba(0, 195, 255, 0); }
        }

        .scanning-active {
            animation: gentlePulse 1s infinite;
            border-color: #00c3ff !important;
        }

        @media (max-width: 700px) {
            .scan-platform { min-width: 320px; padding: 1rem; }
            .hand-placement-area { width: 280px; height: 320px; }
            .event-title { font-size: 1.6rem; }
            .top-logo { height: 50px; }
            .smart-logo { height: 60px; }
            .top-logos { top: 15px; left: 15px; right: 15px; }
        }
    </style>
</head>
<body>

<!-- خلفية الجسيمات الحية (بدلاً من الـ Lights الثابتة) -->
<div id="particles-js"></div>

<div class="screen-container">
    <!-- الفيديو الرسمي -->
    <video id="eventVideo" class="video-layer" preload="auto">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        فيديو التدشين غير متاح
    </video>

    <!-- الشعارات العلوية -->
    <div class="top-logos">
        <img src="PUT-MOE-LOGO.png" class="top-logo" alt="وزارة التعليم" onerror="this.src='https://placehold.co/100x80/0a1a2a/white?text=وزارة+التعليم'">
        <img src="PUT-STUDENT-LOGO.jpeg" class="top-logo smart-logo" alt="الطالب الذكي" onerror="this.src='https://placehold.co/110x90/0a1a2a/white?text=الطالب+الذكي'">
    </div>

    <!-- منصة التدشين -->
    <div id="scanPlatform" class="scan-platform">
        <div class="event-title">
            ملتقى<br>
            رؤى تُبنى ومستقبل يُرسم
        </div>
        <div class="event-sub">
            تحت رعاية الفاضل الدكتور / مسلم بن سالم الحراصي
        </div>
        <div class="director-name">
            مدير دائرة تطوير الأداء المدرسي
        </div>

        <div id="handArea" class="hand-placement-area">
            <div class="hand-icon">
                <svg viewBox="0 0 120 180" fill="none">
                    <rect x="30" y="70" width="55" height="70" rx="20" stroke="#7ee7ff" stroke-width="1.8" fill="none"/>
                    <rect x="35" y="20" width="12" height="60" rx="6" stroke="#7ee7ff" stroke-width="1.8" fill="none"/>
                    <rect x="50" y="12" width="12" height="68" rx="6" stroke="#7ee7ff" stroke-width="1.8" fill="none"/>
                    <rect x="65" y="18" width="12" height="62" rx="6" stroke="#7ee7ff" stroke-width="1.8" fill="none"/>
                    <rect x="78" y="35" width="12" height="47" rx="6" stroke="#7ee7ff" stroke-width="1.8" fill="none"/>
                    <path d="M25 95 L18 85 L10 95" stroke="#7ee7ff" stroke-width="1.8" fill="none"/>
                </svg>
            </div>
            <div id="scanBar" class="scan-bar"></div>
            <div id="successOverlay" class="success-overlay">
                <span>✓ تم التحقق بنجاح</span>
                <span>بدء عرض الملتقى</span>
            </div>
        </div>

        <div id="statusText" class="status">🤲 ضع يدك لبدء التدشين</div>
        <div class="instruction">ضع باطن يدك داخل الإطار الأزرق لتشغيل العرض الرسمي</div>
    </div>
</div>

<script>
    // *********************************************
    // 1. تفعيل خلفية particles.js الحية (نجوم وخطوط)
    // *********************************************
    particlesJS("particles-js", {
        particles: {
            number: {
                value: 120,        // عدد الجسيمات (أفخم وفضائي)
                density: {
                    enable: true,
                    value_area: 1000
                }
            },
            color: {
                value: ["#00c3ff", "#7ee7ff", "#ffffff", "#0099dd"]
            },
            shape: {
                type: "circle"
            },
            opacity: {
                value: 0.7,
                random: true,
                anim: {
                    enable: false
                }
            },
            size: {
                value: 3.5,
                random: true,
                anim: {
                    enable: false
                }
            },
            line_linked: {
                enable: true,
                distance: 160,
                color: "#00c3ff",
                opacity: 0.32,
                width: 1.2
            },
            move: {
                enable: true,
                speed: 1.2,      // حركة بطيئة وأنيقة (Royal)
                direction: "none",
                random: false,
                straight: false,
                out_mode: "out",
                bounce: false
            }
        },
        interactivity: {
            detect_on: "canvas",
            events: {
                onhover: {
                    enable: false   // بدون تفاعل للحفاظ على الاحترافية
                },
                onclick: {
                    enable: false
                }
            }
        },
        retina_detect: true
    });

    // *********************************************
    // 2. منطق التدشين باللمس والفيديو (مثل ما تفضلت)
    // *********************************************
    const videoEl = document.getElementById("eventVideo");
    const handArea = document.getElementById("handArea");
    const scanBar = document.getElementById("scanBar");
    const successOverlay = document.getElementById("successOverlay");
    const statusText = document.getElementById("statusText");
    const platform = document.getElementById("scanPlatform");

    let isVideoPlaying = false;
    let isScanning = false;
    let cooldown = false;

    function startSoftScan() {
        return new Promise((resolve) => {
            scanBar.style.display = "block";
            scanBar.style.top = "0px";
            handArea.classList.add("scanning-active");

            const height = handArea.offsetHeight;
            let pos = 0;
            const step = 4.5;
            const interval = setInterval(() => {
                pos += step;
                scanBar.style.top = pos + "px";
                if (pos >= height) {
                    clearInterval(interval);
                    scanBar.style.display = "none";
                    handArea.classList.remove("scanning-active");
                    resolve();
                }
            }, 12);
        });
    }

    function showFormalSuccess() {
        return new Promise((resolve) => {
            successOverlay.style.opacity = "1";
            // صوت خفيف للنجاح
            try {
                const audio = new AudioContext();
                const osc = audio.createOscillator();
                const gain = audio.createGain();
                osc.connect(gain);
                gain.connect(audio.destination);
                osc.frequency.value = 523.25;
                gain.gain.value = 0.12;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audio.currentTime + 0.7);
                osc.stop(audio.currentTime + 0.7);
            } catch (e) {}
            setTimeout(() => {
                successOverlay.style.opacity = "0";
                resolve();
            }, 1200);
        });
    }

    function playOfficialVideo() {
        videoEl.style.display = "block";
        videoEl.currentTime = 0;
        videoEl.play().then(() => {
            if (statusText) statusText.innerText = "🎥 جاري عرض الملتقى التعليمي";
            isVideoPlaying = true;
            platform.style.opacity = "0";
            platform.style.pointerEvents = "none";
            platform.style.transition = "0.6s";
        }).catch((err) => {
            console.warn("تشغيل الفيديو تلقائياً تم منعه، يرجى التفاعل مع الصفحة أولاً.");
            if (statusText) statusText.innerText = "🤲 اضغط مرة أخرى لبدء العرض";
            isVideoPlaying = false;
        });
    }

    videoEl.addEventListener("ended", () => {
        videoEl.style.display = "none";
        isVideoPlaying = false;
        platform.style.opacity = "1";
        platform.style.pointerEvents = "auto";
        if (statusText) statusText.innerText = "🤲 ضع يدك لبدء التدشين";
        cooldown = true;
        setTimeout(() => {
            cooldown = false;
            if (!isVideoPlaying && statusText) statusText.innerText = "🤲 ضع يدك لبدء التدشين";
        }, 2500);
    });

    async function initiateHandScan(touchX, touchY) {
        if (isVideoPlaying || isScanning || cooldown) return;

        const rect = handArea.getBoundingClientRect();
        if (touchX < rect.left || touchX > rect.right || touchY < rect.top || touchY > rect.bottom) return;

        isScanning = true;
        if (statusText) statusText.innerText = "🔍 جاري مسح بصمة اليد ...";

        await startSoftScan();
        await showFormalSuccess();
        if (!isVideoPlaying) playOfficialVideo();

        isScanning = false;
    }

    // دعم اللمس والفأرة
    handArea.addEventListener("touchstart", (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        initiateHandScan(touch.clientX, touch.clientY);
    }, { passive: false });

    handArea.addEventListener("mousedown", (e) => {
        e.preventDefault();
        initiateHandScan(e.clientX, e.clientY);
    });

    handArea.addEventListener("contextmenu", (e) => e.preventDefault());

    console.log("✅ الملتقى جاهز - خلفية Particles حية، مسح أزرق، جاهز للعرض على البروجيكتور");
</script>
</body>
</html>
