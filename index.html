<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ملتقى رؤى تُبنى - تدشين حي | خزنة بعجلة عملاقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            cursor: none;
        }

        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: manipulation;
            position: relative;
            background-color: #061423;
        }

        #particles-js {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .screen-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: auto;
        }

        .top-logos {
            position: absolute;
            top: 30px;
            left: 40px;
            right: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .top-logo {
            height: 130px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.3));
            background: rgba(10, 25, 45, 0.5);
            border-radius: 20px;
            padding: 6px 12px;
            backdrop-filter: blur(4px);
        }

        .smart-logo {
            height: 150px;
        }

        .video-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 20;
            display: none;
        }

        .scan-platform {
            position: relative;
            z-index: 15;
            text-align: center;
            background: rgba(6, 20, 35, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 70px;
            padding: 2rem 3rem;
            border: 2px solid rgba(0, 195, 255, 0.6);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 8px rgba(0, 195, 255, 0.1);
            min-width: 800px;
            transition: 0.3s;
        }

        .event-title {
            color: white;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            margin-top: 0.5rem;
            line-height: 1.4;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.5);
        }

        .event-sub {
            color: #ffd166;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 15px;
            border-bottom: 1px dashed #ffd166;
            display: inline-block;
            padding-bottom: 5px;
        }

        .director-name {
            color: #d9e6f2;
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .hand-placement-area {
            position: relative;
            width: 360px;
            height: 380px;
            margin: 15px auto;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50px;
            border: 2px solid rgba(0, 195, 255, 0.8);
            box-shadow: inset 0 0 40px rgba(0, 195, 255, 0.15), 0 0 30px rgba(0, 195, 255, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: 0.2s;
            backdrop-filter: blur(4px);
            cursor: pointer;
        }

        .hand-icon {
            width: 130px;
            height: auto;
            opacity: 0.45;
            filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.3));
            transition: 0.2s;
        }

        .hand-icon svg {
            width: 100%;
            fill: none;
            stroke: #7ee7ff;
            stroke-width: 1.8;
        }

        .scan-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, transparent, #00c3ff, #7ee7ff, #ffffff, #00c3ff, transparent);
            box-shadow: 0 0 15px #00c3ff, 0 0 30px #7ee7ff;
            z-index: 25;
            display: none;
            pointer-events: none;
            border-radius: 3px;
        }

        .scanning-active {
            animation: gentlePulse 0.8s infinite;
            border-color: #00c3ff !important;
        }

        @keyframes gentlePulse {
            0% { border-color: rgba(0, 195, 255, 0.6); box-shadow: 0 0 0 0 rgba(0, 195, 255, 0.3); }
            100% { border-color: #00c3ff; box-shadow: 0 0 0 15px rgba(0, 195, 255, 0); }
        }

        .scan-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 195, 255, 0.15) 0%, rgba(0, 195, 255, 0) 70%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 20;
        }

        /* خزنة كامل الشاشة */
        .vault-fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 200;
            pointer-events: none;
            visibility: hidden;
            overflow: hidden;
        }

        .vault-fullscreen.active {
            visibility: visible;
        }

        .vault-door-left-full,
        .vault-door-right-full {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(145deg, #1a2a36, #0f1a22);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 202;
            border-right: 2px solid rgba(184, 134, 11, 0.5);
            border-left: 2px solid rgba(184, 134, 11, 0.5);
            backdrop-filter: blur(5px);
        }

        .vault-door-left-full {
            left: 0;
            transform-origin: left center;
            border-radius: 0 20px 20px 0;
        }

        .vault-door-right-full {
            right: 0;
            transform-origin: right center;
            border-radius: 20px 0 0 20px;
        }

        /* عجلة الخزنة - حجم عملاق جداً */
        .vault-wheel-full {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 550px;
            height: 550px;
            border-radius: 50%;
            background: radial-gradient(circle, #4a5e6e, #1e2e3a);
            border: 18px solid #b8860b;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.8), inset 0 0 50px rgba(255, 215, 0, 0.4);
            z-index: 203;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* المقبض المعدني العملاق */
        .vault-wheel-full::after {
            content: "⚙";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16rem;
            color: #d4af37;
            text-shadow: 0 0 30px #ffd700, 0 0 10px rgba(0, 0, 0, 0.5);
        }

        /* دوائر متحدة المركز للعجلة */
        .wheel-rings {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 480px;
            height: 480px;
            border-radius: 50%;
            border: 3px solid rgba(184, 134, 11, 0.5);
            pointer-events: none;
        }

        .wheel-rings::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 215, 0, 0.3);
        }

        .wheel-rings::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 1px solid rgba(184, 134, 11, 0.4);
        }

        /* مقابض جانبية للعجلة (مسامير) */
        .wheel-bolts {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 510px;
            height: 510px;
            border-radius: 50%;
            pointer-events: none;
        }

        .wheel-bolts::before,
        .wheel-bolts::after {
            content: "●";
            position: absolute;
            color: #b8860b;
            font-size: 20px;
            text-shadow: 0 0 5px #ffd700;
        }

        .wheel-bolts::before {
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        .wheel-bolts::after {
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        .white-light-burst-full {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(255,255,245,1) 0%, rgba(255,255,200,0.95) 25%, rgba(255,255,180,0.7) 50%, rgba(255,255,255,0) 80%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 210;
            opacity: 0;
            pointer-events: none;
            transition: all 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.2);
        }

        .screen-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,230,0.8) 0%, rgba(255,255,200,0.4) 60%, rgba(255,255,255,0) 100%);
            z-index: 209;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .status {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 20px 0 10px;
            color: #7ee7ff;
            background: rgba(0, 195, 255, 0.2);
            display: inline-block;
            padding: 8px 25px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
        }

        .instruction {
            font-size: 0.95rem;
            color: #b8d8fc;
            font-weight: 500;
        }

        @media (max-width: 700px) {
            .scan-platform { min-width: 320px; padding: 1rem; }
            .hand-placement-area { width: 280px; height: 320px; }
            .event-title { font-size: 1.6rem; }
            .top-logo { height: 80px; }
            .smart-logo { height: 90px; }
            .top-logos { top: 15px; left: 15px; right: 15px; }
            .vault-wheel-full { width: 280px; height: 280px; border-width: 10px; }
            .vault-wheel-full::after { font-size: 7rem; }
            .wheel-rings { width: 240px; height: 240px; }
            .wheel-rings::before { width: 200px; height: 200px; }
            .wheel-rings::after { width: 160px; height: 160px; }
        }

        /* للشاشات الكبيرة جداً (أكثر من 1400px) */
        @media (min-width: 1400px) {
            .vault-wheel-full { width: 650px; height: 650px; }
            .vault-wheel-full::after { font-size: 19rem; }
            .wheel-rings { width: 560px; height: 560px; }
            .wheel-rings::before { width: 470px; height: 470px; }
            .wheel-rings::after { width: 380px; height: 380px; }
        }

        @media (min-width: 1800px) {
            .vault-wheel-full { width: 750px; height: 750px; }
            .vault-wheel-full::after { font-size: 22rem; }
            .wheel-rings { width: 650px; height: 650px; }
            .wheel-rings::before { width: 540px; height: 540px; }
            .wheel-rings::after { width: 440px; height: 440px; }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="screen-container">
        <video id="eventVideo" class="video-layer" preload="auto">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>

        <div class="top-logos">
            <img src="PUT-MOE-LOGO.png" class="top-logo" alt="وزارة التعليم" onerror="this.src='https://placehold.co/140x110/0a1a2a/white?text=وزارة+التعليم'">
            <img src="PUT-STUDENT-LOGO.jpeg" class="top-logo smart-logo" alt="الطالب الذكي" onerror="this.src='https://placehold.co/160x120/0a1a2a/white?text=الطالب+الذكي'">
        </div>

        <div id="scanPlatform" class="scan-platform">
            <div class="event-title">
                ملتقى<br>
                رؤى تُبنى ومستقبل يُرسم
            </div>
            <div class="event-sub">
                تحت رعاية الفاضل الدكتور / مسلم بن سالم الحراصي
            </div>
            <div class="director-name">مدير دائرة تطوير الأداء المدرسي</div>

            <div id="handArea" class="hand-placement-area">
                <div class="hand-icon">
                    <svg viewBox="0 0 120 180" fill="none">
                        <rect x="30" y="70" width="55" height="70" rx="20" stroke="#7ee7ff" stroke-width="1.8" fill="none"/>
                        <rect x="35" y="20" width="12" height="60" rx="6" stroke="#7ee7ff" stroke-width="1.8" fill="none"/>
                        <rect x="50" y="12" width="12" height="68" rx="6" stroke="#7ee7ff" stroke-width="1.8" fill="none"/>
                        <rect x="65" y="18" width="12" height="62" rx="6" stroke="#7ee7ff" stroke-width="1.8" fill="none"/>
                        <rect x="78" y="35" width="12" height="47" rx="6" stroke="#7ee7ff" stroke-width="1.8" fill="none"/>
                        <path d="M25 95 L18 85 L10 95" stroke="#7ee7ff" stroke-width="1.8" fill="none"/>
                    </svg>
                </div>
                <div id="scanBar" class="scan-bar"></div>
                <div id="scanGlow" class="scan-glow"></div>
            </div>

            <div id="statusText" class="status">🤲 ضع يدك لفتح خزنة التدشين</div>
            <div class="instruction">ضع باطن يدك داخل الإطار الأزرق - سيتم مسح البصمة ببطء وواقعية</div>
        </div>
    </div>

    <div id="vaultFullscreen" class="vault-fullscreen">
        <div class="vault-door-left-full" id="doorLeftFull"></div>
        <div class="vault-door-right-full" id="doorRightFull"></div>
        <div class="vault-wheel-full" id="vaultWheelFull">
            <div class="wheel-rings"></div>
            <div class="wheel-bolts"></div>
        </div>
        <div id="whiteLightFull" class="white-light-burst-full"></div>
        <div id="screenFlash" class="screen-flash"></div>
    </div>

    <script>
        particlesJS("particles-js", {
            particles: {
                number: { value: 130, density: { enable: true, value_area: 1000 } },
                color: { value: ["#00c3ff", "#7ee7ff", "#ffffff", "#0099dd"] },
                shape: { type: "circle" },
                opacity: { value: 0.7, random: true },
                size: { value: 3, random: true },
                line_linked: { enable: true, distance: 160, color: "#00c3ff", opacity: 0.32, width: 1.2 },
                move: { enable: true, speed: 1.1, direction: "none", random: false, straight: false, out_mode: "out" }
            },
            interactivity: { detect_on: "canvas", events: { onhover: { enable: false }, onclick: { enable: false } } },
            retina_detect: true
        });

        const videoEl = document.getElementById("eventVideo");
        const handArea = document.getElementById("handArea");
        const scanBar = document.getElementById("scanBar");
        const scanGlow = document.getElementById("scanGlow");
        const statusText = document.getElementById("statusText");
        const platform = document.getElementById("scanPlatform");

        const vaultFullscreen = document.getElementById("vaultFullscreen");
        const doorLeftFull = document.getElementById("doorLeftFull");
        const doorRightFull = document.getElementById("doorRightFull");
        const vaultWheelFull = document.getElementById("vaultWheelFull");
        const whiteLightFull = document.getElementById("whiteLightFull");
        const screenFlash = document.getElementById("screenFlash");

        let isVideoPlaying = false;
        let isScanning = false;
        let cooldown = false;

        async function realisticFingerprintScan() {
            return new Promise(async (resolve) => {
                const height = handArea.offsetHeight;
                const scanDuration = 780;

                scanBar.style.display = "block";
                scanGlow.style.opacity = "0.4";
                handArea.classList.add("scanning-active");

                const animateScan = (startPos, endPos, duration, callback) => {
                    const startTime = performance.now();

                    const updatePosition = (currentTime) => {
                        const elapsed = currentTime - startTime;
                        let progress = Math.min(1, elapsed / duration);
                        const easeProgress = progress < 0.5
                            ? 4 * progress * progress * progress
                            : 1 - Math.pow(-2 * progress + 2, 3) / 2;

                        const newPos = startPos + (endPos - startPos) * easeProgress;
                        scanBar.style.top = newPos + "px";

                        const intensity = Math.sin(progress * Math.PI);
                        scanBar.style.boxShadow = `0 0 ${8 + intensity * 18}px #00c3ff, 0 0 ${15 + intensity * 25}px #7ee7ff`;

                        if (progress < 1) {
                            requestAnimationFrame(updatePosition);
                        } else {
                            if (callback) callback();
                        }
                    };

                    requestAnimationFrame(updatePosition);
                };

                await new Promise((resolveFirst) => {
                    animateScan(0, height - 10, scanDuration, () => {
                        playBeepSound(750, 0.1);
                        setTimeout(resolveFirst, 80);
                    });
                });

                await new Promise((resolveSecond) => {
                    animateScan(height - 10, 0, scanDuration, () => {
                        playBeepSound(950, 0.1);
                        setTimeout(resolveSecond, 80);
                    });
                });

                await new Promise((resolveThird) => {
                    animateScan(0, height / 2.5, scanDuration * 0.7, () => {
                        playBeepSound(1100, 0.12);
                        setTimeout(resolveThird, 60);
                    });
                });

                scanBar.style.display = "none";
                scanGlow.style.opacity = "0";
                handArea.classList.remove("scanning-active");

                handArea.style.transition = "box-shadow 0.2s";
                handArea.style.boxShadow = "inset 0 0 40px rgba(0,255,100,0.3), 0 0 30px rgba(0,255,100,0.4)";
                setTimeout(() => {
                    handArea.style.boxShadow = "inset 0 0 40px rgba(0, 195, 255, 0.15), 0 0 30px rgba(0, 195, 255, 0.2)";
                }, 250);

                resolve();
            });
        }

        function playBeepSound(frequency = 880, duration = 0.1) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = frequency;
                gainNode.gain.value = 0.1;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
                oscillator.stop(audioCtx.currentTime + duration);
            } catch (e) { }
        }

        function openFullscreenVault() {
            return new Promise(async (resolve) => {
                vaultFullscreen.classList.add("active");

                const handIcon = document.querySelector(".hand-icon");
                handIcon.style.transition = "0.2s";
                handIcon.style.opacity = "0";

                vaultWheelFull.style.transition = "transform 1.2s cubic-bezier(0.4, 0, 0.2, 1)";
                vaultWheelFull.style.transform = "translate(-50%, -50%) rotate(900deg)";

                await new Promise((r) => setTimeout(r, 800));

                doorLeftFull.style.transform = "translateX(-100%)";
                doorRightFull.style.transform = "translateX(100%)";

                setTimeout(() => {
                    whiteLightFull.style.width = "100vw";
                    whiteLightFull.style.height = "100vh";
                    whiteLightFull.style.opacity = "1";

                    screenFlash.style.opacity = "0.7";
                    setTimeout(() => { screenFlash.style.opacity = "0"; }, 500);

                    const container = document.querySelector(".screen-container");
                    if (container) {
                        container.style.transform = "scale(1.02)";
                        setTimeout(() => { container.style.transform = "scale(1)"; }, 250);
                    }
                }, 120);

                await new Promise((r) => setTimeout(r, 1300));

                handIcon.style.opacity = "0.45";
                vaultFullscreen.classList.remove("active");

                doorLeftFull.style.transform = "translateX(0)";
                doorRightFull.style.transform = "translateX(0)";
                vaultWheelFull.style.transform = "translate(-50%, -50%) rotate(0deg)";
                whiteLightFull.style.width = "0";
                whiteLightFull.style.height = "0";
                whiteLightFull.style.opacity = "0";
                screenFlash.style.opacity = "0";

                resolve();
            });
        }

        function playOfficialVideo() {
            videoEl.style.display = "block";
            videoEl.currentTime = 0;
            videoEl.play().then(() => {
                if (statusText) statusText.innerText = "🎥 جاري عرض الملتقى التعليمي";
                isVideoPlaying = true;
                platform.style.opacity = "0";
                platform.style.pointerEvents = "none";
                platform.style.transition = "0.6s";
            }).catch((err) => {
                console.warn("التشغيل التلقائي مقيد");
                if (statusText) statusText.innerText = "🤲 اضغط مرة أخرى لتشغيل العرض";
                isVideoPlaying = false;
            });
        }

        videoEl.addEventListener("ended", () => {
            videoEl.style.display = "none";
            isVideoPlaying = false;
            platform.style.opacity = "1";
            platform.style.pointerEvents = "auto";
            if (statusText) statusText.innerText = "🤲 ضع يدك لفتح خزنة التدشين";
            cooldown = true;
            setTimeout(() => {
                cooldown = false;
                if (!isVideoPlaying && statusText) statusText.innerText = "🤲 ضع يدك لفتح خزنة التدشين";
            }, 2000);
        });

        async function initiateHandScan(touchX, touchY) {
            if (isVideoPlaying || isScanning || cooldown) return;

            const rect = handArea.getBoundingClientRect();
            if (touchX < rect.left || touchX > rect.right || touchY < rect.top || touchY > rect.bottom) return;

            isScanning = true;
            if (statusText) statusText.innerText = "🔍 جاري مسح البصمة ببطء...";

            await realisticFingerprintScan();

            if (statusText) statusText.innerText = "✅ تم التحقق - فتح الخزنة";

            await openFullscreenVault();

            if (!isVideoPlaying) {
                playOfficialVideo();
            }

            isScanning = false;
        }

        handArea.addEventListener("touchstart", (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            initiateHandScan(touch.clientX, touch.clientY);
        }, { passive: false });

        handArea.addEventListener("mousedown", (e) => {
            e.preventDefault();
            initiateHandScan(e.clientX, e.clientY);
        });

        handArea.addEventListener("contextmenu", (e) => e.preventDefault());

        doorLeftFull.style.transform = "translateX(0)";
        doorRightFull.style.transform = "translateX(0)";
        doorLeftFull.style.transition = "transform 1.5s cubic-bezier(0.4, 0, 0.2, 1)";
        doorRightFull.style.transition = "transform 1.5s cubic-bezier(0.4, 0, 0.2, 1)";

        console.log("✅ عجلة الخزنة عملاقة: 550px مع مقبض مركزي ضخم، وتتكيف مع الشاشات الكبيرة جداً");
    </script>
